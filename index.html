<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamFlix | Embedded Media Player | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 4px; }
        
        /* Header */
        .header { background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%); padding: 20px 40px; position: sticky; top: 0; z-index: 1000; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #E50914, #B20710); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .search-box { display: flex; align-items: center; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 8px 18px; }
        .search-box input { background: transparent; border: none; padding: 8px; color: white; width: 250px; outline: none; }
        .search-box button { background: transparent; border: none; color: white; cursor: pointer; }
        .search-box button:hover { color: #E50914; }
        
        /* Categories */
        .categories { max-width: 1400px; margin: 30px auto 20px; padding: 0 40px; display: flex; gap: 15px; flex-wrap: wrap; }
        .cat-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 10px 28px; border-radius: 40px; color: #fff; cursor: pointer; transition: all 0.3s; font-size: 14px; font-weight: 500; }
        .cat-btn:hover, .cat-btn.active { background: #E50914; border-color: #E50914; transform: scale(1.02); }
        
        .section-title { max-width: 1400px; margin: 40px auto 20px; padding: 0 40px; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .section-title i { color: #E50914; }
        
        .movies-container { max-width: 1400px; margin: 0 auto; padding: 0 40px 20px; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        
        /* Movie Card */
        .movie-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .movie-thumbnail { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .movie-thumbnail img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .movie-card:hover .movie-thumbnail img { transform: scale(1.1); }
        .movie-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .movie-card:hover .movie-overlay { opacity: 1; }
        .play-icon { width: 55px; height: 55px; background: #E50914; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        .play-icon:hover { transform: scale(1.15); }
        .movie-info { padding: 12px; }
        .movie-title { font-weight: 600; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 12px; color: #b3b3b3; }
        .badge-adult { position: absolute; top: 10px; right: 10px; background: #E50914; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 5; }
        .badge-series { position: absolute; top: 10px; left: 10px; background: #3498db; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        
        /* ========== MEDIA PLAYER MODAL (Professional) ========== */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 1200px; background: #111; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .modal-header { padding: 18px 24px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .modal-header h3 { color: #E50914; font-size: 20px; }
        .close-modal { background: rgba(255,255,255,0.1); border: none; width: 38px; height: 38px; border-radius: 50%; color: white; cursor: pointer; transition: all 0.2s; }
        .close-modal:hover { background: #E50914; transform: rotate(90deg); }
        
        /* Professional Video Player */
        .video-wrapper { position: relative; background: #000; }
        .video-wrapper video { width: 100%; max-height: 70vh; display: block; background: #000; }
        
        /* Custom Controls Bar */
        .video-controls { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border-top: 1px solid #333; }
        .control-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .control-btn:hover { background: rgba(229,9,20,0.3); color: #E50914; }
        .progress-container { flex: 1; display: flex; align-items: center; gap: 12px; }
        .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 5px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: #E50914; border-radius: 5px; width: 0%; position: relative; }
        .time-display { color: #aaa; font-size: 13px; font-family: monospace; }
        .volume-control { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 80px; height: 4px; background: #333; border-radius: 4px; cursor: pointer; }
        .volume-fill { height: 100%; background: #E50914; width: 100%; border-radius: 4px; }
        .quality-select { background: #2a2a2a; border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .download-btn-player { background: #2a2a2a; border: none; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .download-btn-player:hover { background: #E50914; }
        
        /* Admin Panel */
        .admin-panel { position: fixed; bottom: 30px; right: 30px; z-index: 200; }
        .admin-toggle { width: 55px; height: 55px; background: #E50914; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(229,9,20,0.5); }
        .admin-toggle:hover { transform: scale(1.1); }
        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .admin-modal.active { display: flex; }
        .admin-form { background: #1a1a1a; border-radius: 20px; padding: 30px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
        .admin-form h3, .admin-form h4 { color: #E50914; margin-bottom: 15px; margin-top: 20px; }
        .admin-form input, .admin-form select, .admin-form textarea { width: 100%; background: #2d2d2d; border: 1px solid #3d3d3d; border-radius: 10px; padding: 12px; color: white; margin-bottom: 15px; outline: none; }
        .admin-form input:focus { border-color: #E50914; }
        .admin-form button { background: #E50914; border: none; color: white; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 10px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .movie-list-admin { margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .admin-movie-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #3d3d3d; }
        .delete-movie { background: rgba(229,9,20,0.2); border: 1px solid #E50914; color: #E50914; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 50px; z-index: 4000; animation: fadeInOut 2s ease; border-left: 4px solid #E50914; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(20px); } }
        
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .categories, .section-title, .movies-container { padding: 0 20px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .video-controls { gap: 10px; }
            .control-btn { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo"><h1>🎬 STREAMFLIX</h1></div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search movies..."><button id="searchBtn"><i class="fas fa-search"></i></button></div>
        </div>
    </div>

    <div class="categories" id="categoriesContainer"></div>

    <div class="section-title"><i class="fas fa-fire"></i><span>All Movies & Series</span></div>
    <div class="movies-container"><div class="movies-grid" id="moviesGrid"></div></div>

    <!-- Professional Video Player Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Now Playing</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="video-wrapper">
                <video id="videoPlayer" controlslist="nodownload" playsinline>
                    <source id="videoSource" src="">
                </video>
            </div>
            <div class="video-controls">
                <button class="control-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                </div>
                <div class="volume-control">
                    <button class="control-btn" id="volumeBtn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-slider" id="volumeSlider">
                        <div class="volume-fill" id="volumeFill" style="width: 100%"></div>
                    </div>
                </div>
                <select class="quality-select" id="qualitySelect">
                    <option value="auto">Auto</option>
                </select>
                <button class="download-btn-player" id="downloadBtnPlayer"><i class="fas fa-download"></i> Download</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel"><div class="admin-toggle" id="adminToggle"><i class="fas fa-cog"></i></div></div>
    <div class="admin-modal" id="adminModal">
        <div class="admin-form">
            <h3><i class="fas fa-lock"></i> Admin Access</h3>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button id="verifyAdminBtn">Verify</button>
            <div id="adminContent" style="display: none;">
                <h4><i class="fas fa-plus-circle"></i> Add New Movie/Content</h4>
                <input type="text" id="movieTitle" placeholder="Movie/Series Title *">
                <input type="text" id="movieYear" placeholder="Year *">
                <select id="movieCategory"><option value="all">All</option><option value="adult">Adult (18+)</option><option value="family">Family Friendly</option></select>
                <input type="text" id="movieThumb" placeholder="Thumbnail Image URL *">
                <input type="text" id="movieVideo" placeholder="VIDEO URL (Google Drive / Direct MP4 / Any streaming link) *">
                <div class="checkbox-group"><input type="checkbox" id="parentSafeCheck"><label>✓ Parent Mode Safe</label></div>
                <input type="text" id="downloadLink" placeholder="Download Link (Optional)">
                <button id="addMovieBtn">+ Add Content</button>
                
                <h4><i class="fas fa-list"></i> Manage Content</h4>
                <div class="movie-list-admin" id="adminMovieList"></div>
                <p style="font-size: 12px; color: #888; margin-top: 10px;">💡 Tip: Google Drive link ko direct MP4 link mein convert karein: https://drive.google.com/uc?export=download&id=YOUR_FILE_ID</p>
            </div>
        </div>
    </div>

    <script>
        // ---------- STORAGE KEYS ----------
        let movies = [
            { id: 1, title: "Sample Movie 1", year: 2023, category: "all", thumbnail: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4", downloadUrl: "", parentSafe: true },
            { id: 2, title: "Sample Movie 2", year: 2024, category: "all", thumbnail: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4", downloadUrl: "", parentSafe: false }
        ];
        
        let currentCategory = "all";
        let searchQuery = "";
        let currentMovie = null;
        
        // Save/Load
        function saveMovies() { localStorage.setItem('streamflix_movies', JSON.stringify(movies)); }
        function loadMovies() { const saved = localStorage.getItem('streamflix_movies'); if (saved) movies = JSON.parse(saved); else saveMovies(); }
        
        // Render
        function renderCategories() {
            const cats = [{ id: 'all', name: 'All' }, { id: 'adult', name: '18+ Adult' }, { id: 'family', name: 'Family Safe' }];
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = cats.map(cat => `<button class="cat-btn ${currentCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">${cat.name}</button>`).join('');
            document.querySelectorAll('.cat-btn').forEach(btn => btn.addEventListener('click', () => { currentCategory = btn.dataset.category; renderMovies(); renderCategories(); }));
        }
        
        function renderMovies() {
            const grid = document.getElementById('moviesGrid');
            let filtered = [...movies];
            if (currentCategory === 'adult') filtered = filtered.filter(m => m.parentSafe === false);
            else if (currentCategory === 'family') filtered = filtered.filter(m => m.parentSafe === true);
            if (searchQuery) filtered = filtered.filter(m => m.title.toLowerCase().includes(searchQuery.toLowerCase()));
            
            if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center; padding:60px; color:#666;"><i class="fas fa-film"></i><p>No content found</p></div>'; return; }
            
            grid.innerHTML = filtered.map(movie => `
                <div class="movie-card" onclick="openMovie(${movie.id})">
                    <div class="movie-thumbnail">
                        ${!movie.parentSafe ? '<div class="badge-adult">🔞 18+</div>' : ''}
                        <img src="${movie.thumbnail}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                        <div class="movie-overlay"><div class="play-icon"><i class="fas fa-play"></i></div></div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta"><span>${movie.year}</span><span><i class="fas fa-play-circle"></i> Watch</span></div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== PROFESSIONAL VIDEO PLAYER ==========
        let player = null;
        
        function openMovie(id) {
            currentMovie = movies.find(m => m.id === id);
            if (!currentMovie) return;
            
            document.getElementById('modalTitle').innerHTML = currentMovie.title;
            const videoSrc = document.getElementById('videoSource');
            videoSrc.src = currentMovie.videoUrl;
            
            const video = document.getElementById('videoPlayer');
            video.load();
            
            document.getElementById('videoModal').classList.add('active');
            
            // Setup player controls after modal opens
            setTimeout(() => setupPlayerControls(currentMovie), 100);
        }
        
        function setupPlayerControls(movie) {
            const video = document.getElementById('videoPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const timeDisplay = document.getElementById('timeDisplay');
            const volumeBtn = document.getElementById('volumeBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeFill = document.getElementById('volumeFill');
            const downloadBtn = document.getElementById('downloadBtnPlayer');
            
            // Play/Pause
            playPauseBtn.onclick = () => {
                if (video.paused) { video.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
                else { video.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
            };
            
            video.onplay = () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            video.onpause = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            
            // Progress bar
            video.ontimeupdate = () => {
                const percent = (video.currentTime / video.duration) * 100;
                progressFill.style.width = percent + '%';
                const currentMin = Math.floor(video.currentTime / 60);
                const currentSec = Math.floor(video.currentTime % 60).toString().padStart(2, '0');
                const durMin = Math.floor(video.duration / 60) || 0;
                const durSec = Math.floor(video.duration % 60).toString().padStart(2, '0');
                timeDisplay.innerText = `${currentMin}:${currentSec} / ${durMin}:${durSec}`;
            };
            
            progressBar.onclick = (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                video.currentTime = percent * video.duration;
            };
            
            // Volume
            volumeBtn.onclick = () => {
                video.muted = !video.muted;
                volumeBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                volumeFill.style.width = video.muted ? '0%' : (video.volume * 100) + '%';
            };
            
            volumeSlider.onclick = (e) => {
                const rect = volumeSlider.getBoundingClientRect();
                let vol = (e.clientX - rect.left) / rect.width;
                vol = Math.min(1, Math.max(0, vol));
                video.volume = vol;
                volumeFill.style.width = vol * 100 + '%';
                video.muted = false;
                volumeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            };
            
            video.volume = 1;
            
            // Download button
            if (movie.downloadUrl && movie.downloadUrl.trim() !== '') {
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = movie.downloadUrl;
                    a.download = `${movie.title}.mp4`;
                    a.click();
                    showToast(`Downloading ${movie.title}...`);
                };
            } else {
                downloadBtn.onclick = () => showToast('No download link available for this content', true);
            }
            
            video.play().catch(e => console.log('Autoplay blocked'));
        }
        
        function closeModal() {
            const video = document.getElementById('videoPlayer');
            video.pause();
            document.getElementById('videoModal').classList.remove('active');
        }
        
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? 'rgba(229,9,20,0.9)' : 'rgba(0,0,0,0.9)';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ========== ADMIN FUNCTIONS ==========
        function verifyAdmin() {
            if (document.getElementById('adminPassword').value === 'admin123') {
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('verifyAdminBtn').style.display = 'none';
                renderAdminMovieList();
                showToast('Admin access granted!');
            } else { showToast('Wrong password!', true); }
        }
        
        function renderAdminMovieList() {
            const container = document.getElementById('adminMovieList');
            container.innerHTML = movies.map(movie => `
                <div class="admin-movie-item">
                    <span><strong>${movie.title}</strong> (${movie.year}) ${movie.parentSafe ? '👶 Safe' : '🔞 Adult'}</span>
                    <button class="delete-movie" onclick="deleteMovie(${movie.id})">Delete</button>
                </div>
            `).join('');
        }
        
        function addMovie() {
            const title = document.getElementById('movieTitle').value.trim();
            const year = document.getElementById('movieYear').value.trim();
            const thumbnail = document.getElementById('movieThumb').value.trim();
            const videoUrl = document.getElementById('movieVideo').value.trim();
            const parentSafe = document.getElementById('parentSafeCheck').checked;
            const downloadLink = document.getElementById('downloadLink').value.trim();
            
            if (!title || !year || !thumbnail || !videoUrl) { showToast('Please fill all required fields!', true); return; }
            
            const newId = Math.max(...movies.map(m => m.id), 0) + 1;
            movies.push({ id: newId, title, year: parseInt(year), category: 'all', thumbnail, videoUrl, downloadUrl: downloadLink, parentSafe });
            saveMovies();
            renderMovies();
            renderAdminMovieList();
            renderCategories();
            showToast(`✅ "${title}" added successfully!`);
            
            // Clear form
            document.getElementById('movieTitle').value = '';
            document.getElementById('movieYear').value = '';
            document.getElementById('movieThumb').value = '';
            document.getElementById('movieVideo').value = '';
            document.getElementById('parentSafeCheck').checked = false;
            document.getElementById('downloadLink').value = '';
        }
        
        function deleteMovie(id) {
            if (confirm('Delete this content permanently?')) {
                movies = movies.filter(m => m.id !== id);
                saveMovies();
                renderMovies();
                renderAdminMovieList();
                showToast('Content deleted');
            }
        }
        
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value;
            renderMovies();
        }
        
        // Event Listeners
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
        document.getElementById('adminToggle').addEventListener('click', () => document.getElementById('adminModal').classList.add('active'));
        document.getElementById('verifyAdminBtn').addEventListener('click', verifyAdmin);
        document.getElementById('addMovieBtn').addEventListener('click', addMovie);
        document.getElementById('videoModal').addEventListener('click', (e) => { if (e.target === document.getElementById('videoModal')) closeModal(); });
        document.getElementById('adminModal').addEventListener('click', (e) => { if (e.target === document.getElementById('adminModal')) { document.getElementById('adminModal').classList.remove('active'); document.getElementById('adminContent').style.display = 'none'; document.getElementById('verifyAdminBtn').style.display = 'block'; document.getElementById('adminPassword').value = ''; } });
        
        window.openMovie = openMovie;
        window.closeModal = closeModal;
        window.deleteMovie = deleteMovie;
        
        // Initialize
        loadMovies();
        renderCategories();
        renderMovies();
        
        console.log('🚀 StreamFlix Ready! Admin Password: admin123 | Add any video link (Google Drive, Direct MP4, etc.)');
    </script>
</body>
</html>
